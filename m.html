<!DOCTYPE html>
<html>
<head>
    <title>PodIntel: Clean NLP Interface</title>
    <style>
        body { 
            background-color: #000000; /* Pure black for starfield blending */
            color: #ececec; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .chat-container {
            background-color: #0a0a0a;
            border: 1px solid #222;
            border-radius: 8px;
            width: 850px;
            height: 550px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            
            /* Clean slide-up entry */
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.6s ease-out forwards;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid #222;
            background-color: #0d0d0d;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 { margin: 0; font-size: 16px; font-weight: 500; letter-spacing: 0.5px; }
        
        .model-badge {
            background: #141414;
            border: 1px solid #333;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            letter-spacing: 1px;
        }

        .chat-history {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .sender { 
            font-size: 11px; 
            color: #666; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 500;
        }
        
        .message.user .sender { text-align: right; }

        .bubble {
            padding: 16px 20px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
        }

        /* User Message Styling */
        .message.user .bubble {
            background-color: #1f1f1f;
            border: 1px solid #333;
            color: #fff;
        }

        /* AI Message Styling */
        .message.ai .bubble {
            background-color: #141414;
            border: 1px solid #2a2a2a;
            color: #d4d4d8;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 13px;
        }

        .tag-gray { color: #888; }
        .tag-warning { color: #f59e0b; font-weight: 600; }
        .tag-danger { color: #ef4444; font-weight: 600; }
        .tag-success { color: #10b981; font-weight: 600; }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid #222;
            background-color: #0d0d0d;
            border-radius: 0 0 8px 8px;
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background-color: #141414;
            border: 1px solid #333;
            color: #a1a1aa;
            padding: 14px 16px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 0 24px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #e5e5e5; }
        button:active { transform: scale(0.98); }

        /* Hide AI message initially */
        #ai-response { display: none; }

        @keyframes slideUp { 
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Incident Query Copilot</h2>
            <div class="model-badge">LLAMA3:8B-LOCAL (GPU: ON)</div>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message user">
                <div class="sender">Operator (Campus-Core)</div>
                <div class="bubble">Analyze cluster state. What is causing the I/O fault on shared-storage-pool, and what is the blast radius?</div>
            </div>

            <div class="message ai" id="ai-response">
                <div class="sender">PodIntel Reasoning Engine</div>
                <div class="bubble" id="ai-text"></div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" value="Analyze cluster state. What is causing the I/O fault on shared-storage-pool..." disabled>
            <button onclick="triggerAIResponse()" id="askBtn">Ask PodIntel</button>
        </div>
    </div>

    <script>
        function triggerAIResponse() {
            // Disable button
            document.getElementById('askBtn').style.opacity = '0.5';
            document.getElementById('askBtn').style.pointerEvents = 'none';

            const aiContainer = document.getElementById('ai-response');
            const aiText = document.getElementById('ai-text');
            aiContainer.style.display = 'flex';
            
            // The exact output matching your architecture document
            const responseString = "<span class='tag-gray'>> Executing air-gapped tool calls: get_pod_metrics(), get_blast_radius(), get_granger_causality()...</span>\n\n<span class='tag-danger'>[ROOT CAUSE]</span> The 'grading-worker' pod is experiencing an abnormal I/O loop, consuming 99.8% of the PVC write capacity.\n\n<span class='tag-warning'>[CAUSALITY LOCK]</span> Granger Causality (p=0.003, lag=15s) confirms 'grading-worker' I/O saturation is the direct mathematical cause of latency degradation.\n\n<span class='tag-warning'>[BLAST RADIUS]</span> 'lms-backend' is currently starved of storage I/O and will trigger an eviction timeout in < 30 seconds.\n\n<span class='tag-success'>[RECOMMENDATION]</span> Immediately apply a LimitRange to restrict 'grading-worker' I/O to 50MB/s, or evict the pod to restore 'lms-backend' state.";

            let i = 0;
            let isTag = false;
            let currentHTML = "";
            
            aiText.innerHTML = ""; 
            
            // Typewriter effect function
            function typeWriter() {
                if (i < responseString.length) {
                    currentHTML += responseString.charAt(i);
                    aiText.innerHTML = currentHTML.replace(/\n/g, '<br>');
                    
                    // Fast forward if we hit an HTML tag to prevent breaking the code
                    if(responseString.charAt(i) === '<') isTag = true;
                    if(responseString.charAt(i) === '>') isTag = false;
                    
                    i++;
                    
                    // Variable typing speed (fast for tags, natural for text)
                    let speed = isTag ? 0 : Math.floor(Math.random() * 25) + 5;
                    setTimeout(typeWriter, speed);
                } else {
                    // Scroll to bottom when finished
                    document.getElementById('chatHistory').scrollTop = document.getElementById('chatHistory').scrollHeight;
                }
            }
            // Slight pause before typing starts to simulate thinking
            setTimeout(typeWriter, 400);
        }
    
    </script>
</body>
</html>
